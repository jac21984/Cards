<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Greeting Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e0dcdc;
            font-family: 'Poppins', sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 40px 20px 20px 20px;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: #ff6b6b;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px #fff;
        }

        p.subtitle {
            margin: 0;
            color: #666;
            font-size: 1.1rem;
        }

        .catalog-grid {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-preview-node {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            border: 1px solid #d1d9e6;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .card-preview-node:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }

        .thumbnail-area {
            width: 100%;
            height: 320px;
            background-color: #f9f9f9;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid #eee;
        }

        .thumbnail-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card-preview-node:hover .thumbnail-area img {
            transform: scale(1.03);
        }

        .placeholder-thumb {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Luckiest Guy', cursive;
            color: #b3cde0;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .card-details {
            padding: 15px;
            text-align: center;
        }

        .card-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            color: #444;
            margin: 0 0 5px 0;
            text-transform: uppercase; /* Guarantees all titles show in ALL CAPS */
        }

        .loading-message {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: #666;
            padding: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Greeting Cards</h1>
        <p class="subtitle">Select a card below to open it</p>
    </header>

    <main class="catalog-grid" id="catalogGrid">
        <div class="loading-message" id="loadingStatus">Searching repository for cards...</div>
    </main>

    <script>
        async function loadCardCatalog() {
            const gridContainer = document.getElementById('catalogGrid');
            const loadingStatus = document.getElementById('loadingStatus');

            // Automatically detects your username and repository name from the live URL
            const currentUrl = window.location.hostname; 
            const pathParts = window.location.pathname.split('/').filter(part => part.length > 0);
            
            const username = currentUrl.split('.')[0];
            const repoName = pathParts[0] || 'cards'; 

            // GitHub Public API endpoint to scan the root contents
            const apiEndpoint = `https://api.github.com/repos/${username}/${repoName}/contents/`;

            try {
                const response = await fetch(apiEndpoint);
                if (!response.ok) throw new Error('Could not read repository data');
                
                const contents = await response.ok ? await response.json() : [];
                
                // Clear out the loading notice
                gridContainer.innerHTML = '';

                // Filter out everything except directories/folders
                const folders = contents.filter(item => item.type === 'dir');

                if (folders.length === 0) {
                    gridContainer.innerHTML = '<div class="loading-message">No card folders discovered yet.</div>';
                    return;
                }

                folders.forEach(folder => {
                    const folderName = folder.name;

                    // Convert hyphens into spaces and translate strings to ALL CAPS
                    const titleText = folderName.replace(/-/g, ' ').toUpperCase();

                    // Formulate paths pointing toward subfolder items
                    const subfolderLink = `./${folderName}/`;
                    const coverImgSrc = `./${folderName}/birthday-cover.png`;

                    // Generate the complete responsive node structure
                    const cardNode = document.createElement('a');
                    cardNode.href = subfolderLink;
                    cardNode.className = 'card-preview-node';

                    cardNode.innerHTML = `
                        <div class="thumbnail-area">
                            <img src="${coverImgSrc}" alt="${titleText}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <div class="placeholder-thumb" style="display:none;">${titleText}</div>
                        </div>
                        <div class="card-details">
                            <div class="card-title">${titleText}</div>
                        </div>
                    `;

                    gridContainer.appendChild(cardNode);
                });

            } catch (error) {
                console.error(error);
                loadingStatus.textContent = 'Failed to load catalog automatically from GitHub.';
            }
        }

        // Initialize script execution on page initialization
        document.addEventListener('DOMContentLoaded', loadCardCatalog);
    </script>

</body>
</html>
