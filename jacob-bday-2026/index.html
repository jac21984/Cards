<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Importing the fun font for the inside page -->
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <title>Happy Birthday!</title>
    <style>
        body { 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background: #e0dcdc; overflow: hidden; perspective: 2500px; 
            font-family: 'Luckiest Guy', cursive;
        }

        .card-container { width: 320px; height: 480px; position: relative; transform-style: preserve-3d; }

        .page {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-sizing: border-box; padding: 40px; border: 1px solid #d1d9e6;
        }

        .inside { background: #ffffff; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }

        .cover { transform-origin: left; z-index: 10; transform-style: preserve-3d; cursor: grab; }

        .front-face { 
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; overflow: hidden; border: 1px solid #b3cde0;
            background-color: #f9f9f9;
        }

        .front-face img { 
            width: 100%; height: 100%; object-fit: cover; 
            position: absolute;
        }

        .back-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            background: white; transform: rotateY(180deg); border: 1px solid #ccc;
        }

        h2 { color: #ff6b6b; font-size: 2rem; margin-bottom: 10px; text-align: center; }
        p { color: #444; font-size: 1.3rem; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="birthday-music.mp3" loop></audio>

    <div class="card-container">
        <!-- Inside Page -->
        <div class="page inside" id="inside">
            <h2>...but I realized</h2>
            <p>you're already doing a great job of that yourself! Happy Birthday, Bro!</p>
        </div>
        
        <!-- Cover (Cleaned up - text container removed) -->
        <div class="page cover" id="cover">
            <div class="front-face">
                <img src="birthday-cover.png" alt="Birthday Joke Cover">
            </div>
            <div class="back-face"></div>
        </div>
    </div>

    <script>
        const cover = document.getElementById('cover');
        const inside = document.getElementById('inside');
        const audio = document.getElementById('bgMusic');
        let isDragging = false;
        let startX = 0;
        let currentRotation = 0;

        function handleMove(clientX) {
            if (!isDragging) return;
            let deltaX = startX - clientX;
            let rotation = (deltaX / 300) * 180;
            rotation = Math.max(0, Math.min(180, rotation));
            
            cover.style.transform = `rotateY(-${rotation}deg)`;
            currentRotation = rotation;

            let shadow = 1 - (rotation / 180);
            inside.style.boxShadow = `${15 * shadow}px 5px 25px rgba(0,0,0,${0.2 * shadow})`;
        }

        cover.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX + (currentRotation / 180 * 300);
            audio.play().catch(() => {});
        });

        window.addEventListener('touchmove', (e) => { handleMove(e.touches[0].clientX); });
        window.addEventListener('touchend', () => { isDragging = false; });
        
        cover.addEventListener('mousedown', (e) => { 
            isDragging = true; 
            startX = e.clientX + (currentRotation / 180 * 300);
            audio.play().catch(() => {});
        });
        window.addEventListener('mousemove', (e) => { handleMove(e.clientX); });
        window.addEventListener('mouseup', () => { isDragging = false; });
    </script>
</body>
</html>
